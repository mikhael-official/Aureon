name: Build Aureon APK

on:
  push:
    paths:
      - 'setup.sh'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Generate project files
      run: chmod +x setup.sh && ./setup.sh

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # Este passo é essencial para resolver o erro do Kotlin/Native que apareceu na sua imagem
    - name: Install Kotlin Native dependencies
      run: sudo apt-get update && sudo apt-get install -y libncurses5 libtinfo5

    - name: Build APK
      run: |
        cd Aureon
        # Use ./gradlew em vez de apenas 'gradle' para garantir que 
        # a versão do Gradle do seu projeto seja respeitada
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Aureon-APK
        path: Aureon/composeApp/build/outputs/apk/release/*.apk
